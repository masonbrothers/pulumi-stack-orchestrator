name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node -e 'const pkg = require("./package.json"); const tag = process.env.GITHUB_REF_NAME; const allowed = new Set([pkg.version, `v${pkg.version}`, `${pkg.name}@${pkg.version}`, `${pkg.name}-${pkg.version}`, `${pkg.name}-v${pkg.version}`]); if (!allowed.has(tag)) { console.error(`Release tag ${tag} does not match ${pkg.name} version ${pkg.version}`); process.exit(1); }'
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm test:pack
      - run: npm pack --dry-run
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
